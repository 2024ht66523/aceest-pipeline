<!DOCTYPE html>
<html>
<body style="background:#1a1a1a;color:white">

<h1>ACEest Dashboard</h1>

<form method="POST">

<label>New Client Name:</label>
<input name="new_name" placeholder="Enter new name">

<label>Select Existing Client:</label>
<select name="selected_client">
    <option value="">-- Select Client --</option>
    {% for c in clients %}
    <option value="{{c}}">{{c}}</option>
    {% endfor %}
</select>

<br><br>

<input name="weight" placeholder="Weight">
<input name="membership" placeholder="Membership Expiry">

<select name="program">
{% for p in programs %}
<option>{{p}}</option>
{% endfor %}
</select>

<br><br>

<button name="action" value="save_client">Save</button>
<button name="action" value="load_client">Load</button>
<button name="action" value="generate_ai">AI Program</button>
<button name="action" value="export_pdf">Export PDF</button>

</form>

<pre>{{summary}}</pre>

{% if ai_program %}
<h3>AI Program</h3>
<ul>
{% for item in ai_program %}
<li>{{item.day}} - {{item.exercise}} ({{item.sets}}x{{item.reps}})</li>
{% endfor %}
</ul>
{% endif %}

</body>
</html>

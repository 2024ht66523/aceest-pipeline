<!DOCTYPE html>
<html>
<head>
    <title>ACEest Fitness</title>
</head>
<body style="background:#1a1a1a; color:white; font-family:Arial">

<h1 style="color:gold;">ACEest Fitness System</h1>

<form method="POST">

<input name="name" placeholder="Name" required>
<input name="age" placeholder="Age">
<input name="height" placeholder="Height">
<input name="weight" placeholder="Weight">

<select name="program">
{% for p in programs %}
<option>{{p}}</option>
{% endfor %}
</select>

<input name="target_weight" placeholder="Target Weight">
<input name="target_adherence" placeholder="Target Adherence">

<input type="range" name="adherence" min="0" max="100">

<br><br>

<button name="action" value="save_client">Save Client</button>
<button name="action" value="load_client">Load Client</button>
<button name="action" value="save_progress">Save Progress</button>
<button name="action" value="save_metrics">Save Metrics</button>
<button name="action" value="show_chart">Show Chart</button>

</form>

{% if summary %}
<pre>{{summary}}</pre>
{% endif %}

{% if chart %}
<img src="data:image/png;base64,{{chart}}">
{% endif %}

</body>
</html>
